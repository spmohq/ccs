<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Structure Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #064e3b; 
      --bg-gradient-end: #020617;
      --card-bg: rgba(16, 185, 129, 0.05);
      --card-border: rgba(16, 185, 129, 0.2);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-heading: #ffffff;
      --accent-primary: #10b981; 
      --accent-hover: #34d399;
      --accent-success: #059669;
      --code-bg: rgba(0, 0, 0, 0.4);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --input-bg: rgba(0, 0, 0, 0.3);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      flex-grow: 1;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* Input Section Styles */
    .input-section {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px var(--shadow-color);
      backdrop-filter: blur(12px);
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group:last-child {
      margin-bottom: 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent-primary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      min-height: 80px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    /* Prompt Card Styles */
    .prompt-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 10px 40px var(--shadow-color);
      backdrop-filter: blur(12px);
      padding: 35px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    .prompt-card:hover {
        transform: translateY(-5px);
        border-color: var(--accent-primary);
    }
    .prompt-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
    }
    .prompt-text {
      background-color: var(--code-bg);
      padding: 24px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #ecfdf5;
      line-height: 1.5;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    /* Button Styles */
    .copy-button {
      align-self: flex-end;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      background-color: var(--accent-primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .copy-button:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
    }
    .copy-button.copied {
      background-color: var(--accent-success);
    }
    .icon { width: 18px; height: 18px; }
    .copied-icon { display: none; }
    .copy-button.copied .copy-icon { display: none; }
    .copy-button.copied .copied-icon { display: inline-block; }

    footer {
        margin-top: 60px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.85rem;
        padding-bottom: 40px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Prompt Structure</h1>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label for="infoIn">[Info]</label>
        <textarea id="infoIn" placeholder="Enter background info..."></textarea>
      </div>
      <div class="input-group">
        <label for="questionIn">[Question]</label>
        <textarea id="questionIn" placeholder="Enter what to do..."></textarea>
      </div>
      <div class="input-group">
        <label for="parasIn">[PARASPATHAR]</label>
        <textarea id="parasIn" placeholder="Enter step-by-step instructions..."></textarea>
      </div>
      <div class="input-group">
        <label for="bengaliIn">[Answer in Bengali]</label>
        <textarea id="bengaliIn" placeholder="Enter Bengali tone instructions..."></textarea>
      </div>
    </div>

    <main>
      <div class="prompt-card">
        <div class="prompt-label">Constructed Prompt</div>
        <pre id="displayPrompt" class="prompt-text">[Info]

My question is how to [Question]?

[PARASPATHAR]

[Answer in Bengali]</pre>
        
        <button class="copy-button" id="copyBtn">
          <svg class="icon copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
          <svg class="icon copied-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
          <span class="button-text">Copy Prompt</span>
        </button>
      </div>
    </main>

    <footer>
        <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Prompt Architect. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const infoIn = document.getElementById('infoIn');
    const questionIn = document.getElementById('questionIn');
    const parasIn = document.getElementById('parasIn');
    const bengaliIn = document.getElementById('bengaliIn');
    const displayPrompt = document.getElementById('displayPrompt');
    const copyBtn = document.getElementById('copyBtn');

    const basePrompt = displayPrompt.textContent;

    function updateDisplay() {
      const infoVal = infoIn.value.trim() || '[Info]';
      const questionVal = questionIn.value.trim() || '[Question]';
      const parasVal = parasIn.value.trim() || '[PARASPATHAR]';
      const bengaliVal = bengaliIn.value.trim() || '[Answer in Bengali]';

      let updatedText = basePrompt
        .replace('[Info]', infoVal)
        .replace('[Question]', questionVal)
        .replace('[PARASPATHAR]', parasVal)
        .replace('[Answer in Bengali]', bengaliVal);

      displayPrompt.textContent = updatedText;
    }

    [infoIn, questionIn, parasIn, bengaliIn].forEach(el => el.addEventListener('input', updateDisplay));

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(displayPrompt.textContent).then(() => {
        const btnText = copyBtn.querySelector('.button-text');
        const prevText = btnText.textContent;
        btnText.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          btnText.textContent = prevText;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>

</body>
</html>
