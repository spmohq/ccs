<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Prerequisite Analyzer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #1f2937;
      --bg-gradient-end: #111827;
      --card-bg: rgba(31, 41, 55, 0.5); /* Semi-transparent card background */
      --card-border: rgba(255, 255, 255, 0.1);
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --text-heading: #ffffff;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #34d399;
      --input-bg: #374151;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow-color: rgba(0, 0, 0, 0.25);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      flex-grow: 1;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    p.subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
    }
    .input-section {
        background-color: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 25px;
        margin-bottom: 40px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    .input-group {
        display: flex;
        flex-direction: column;
    }
    .input-group.full-width {
        grid-column: 1 / -1;
    }
    .input-group label {
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .input-group input, .input-group textarea {
        width: 100%;
        padding: 12px 15px;
        background-color: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-group textarea {
        font-family: 'Source Code Pro', monospace;
        resize: vertical;
        min-height: 150px;
    }
    .input-group input:focus, .input-group textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.3);
    }
    .prompts-container {
      display: grid;
      gap: 30px;
    }
    .prompt-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 var(--shadow-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); /* For Safari */
      padding: 25px;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .prompt-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px 0 var(--shadow-color);
    }
    .prompt-card h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--card-border);
    }
    .prompt-text {
      background-color: var(--code-bg);
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Source Code Pro', "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.9rem;
      color: var(--text-primary);
      font-weight: 400;
      flex-grow: 1;
      margin-bottom: 20px;
      border: 1px solid var(--card-border);
    }
    .copy-button {
      align-self: flex-end;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--bg-gradient-end);
      background-color: var(--accent-primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .copy-button:hover {
      background-color: var(--accent-hover);
      transform: scale(1.05);
    }
    .copy-button.copied {
      background-color: var(--accent-success);
    }
    .copy-button .icon { width: 16px; height: 16px; }
    .copy-button .copied-icon { display: none; }
    .copy-button.copied .copy-icon { display: none; }
    .copy-button.copied .copied-icon { display: inline-block; }
    footer {
        text-align: center;
        padding-top: 30px;
        margin-top: auto;
        color: var(--text-secondary);
        font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      body { padding: 20px 15px; }
      h1 { font-size: 2rem; }
      .input-section { grid-template-columns: 1fr; }
      .prompt-card h2 { font-size: 1.4rem; }
      .prompt-text { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Custom Prerequisite Analyzer</h1>
      <p class="subtitle">Generate a learning plan based on text, age, and language.</p>
    </header>

    <main>
      <section class="input-section">
        <div class="input-group full-width">
            <label for="textInput">Insert Your Text Here</label>
            <textarea id="textInput" rows="8" placeholder="Paste the text you want to understand..."></textarea>
        </div>
        <div class="input-group">
            <label for="ageInput">Learner's Age</label>
            <input type="number" id="ageInput" placeholder="e.g., 11" value="11">
        </div>
        <div class="input-group">
            <label for="langInput">Desired Language</label>
            <input type="text" id="langInput" placeholder="e.g., English" value="English">
        </div>
      </section>

      <div class="prompts-container" id="promptsContainer">
        
        <div class="prompt-card">
          <h2>Prerequisite Analysis Prompt</h2>
          <pre id="promptOutput" class="prompt-text"></pre>
          <button class="copy-button" data-target="promptOutput">
            <svg class="icon copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
            <svg class="icon copied-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
            <span class="button-text">Copy Prompt</span>
          </button>
        </div>

      </div>
    </main>
  </div>

  <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- Get DOM Elements ---
      const promptsContainer = document.getElementById('promptsContainer');
      const textInput = document.getElementById('textInput');
      const ageInput = document.getElementById('ageInput');
      const langInput = document.getElementById('langInput');
      const promptOutput = document.getElementById('promptOutput');

      // --- Prompt Template ---
      const promptTemplate = `Please read the following text and help me understand what I need to learn BEFORE I can understand the text itself.

Text:
"[Insert Your Text Here]"

Your task is to:
1. Identify all the prerequisite knowledge, concepts, vocabulary, theories, skills, or experiences that a learner must already have in order to fully understand the text.
2. Compare those prerequisites to the typical knowledge of a [learner's age in digit]-year-old learner.
3. Point out which prerequisites are likely missing or not yet mastered by the learner.
4. Explain each missing prerequisite in warm, simple, friendly [Desired Language] — clearly, gently, and at a beginner level.
5. Create a step-by-step “Prerequisite Learning Plan” that tells the learner exactly what to study first, second, third, and so on, so they can build enough background knowledge to understand the original text confidently.
6. Include simple examples or analogies for each prerequisite so the learner can grasp it quickly.
7. Do NOT rewrite or explain the original text yet — only focus on the knowledge needed BEFORE understanding it.

Please write everything in natural-sounding [Desired Language], using a warm, supportive, conversational voice that someone around age [learner's age in digit] can follow easily.

Your final output structure should be:

A. List of all prerequisite knowledge the text assumes
B. List of missing prerequisites the learner likely does not know yet
C. Beginner-friendly explanations of each missing prerequisite
D. A step-by-step Prerequisite Learning Plan showing the order to learn them
E. Gentle encouragement to start the journey

End of Prompt.`;

      // --- Update Function ---
      function updatePrompts() {
        const text = textInput.value.trim() || '[Insert Your Text Here]';
        const age = ageInput.value.trim() || "[learner's age in digit]";
        const lang = langInput.value.trim() || '[Desired Language]';

        const finalPrompt = promptTemplate
          .replace(/\[Insert Your Text Here\]/g, text)
          .replace(/\[learner's age in digit\]/g, age)
          .replace(/\[Desired Language\]/g, lang);

        promptOutput.textContent = finalPrompt;
      }

      // --- Event Listeners ---
      textInput.addEventListener('input', updatePrompts);
      ageInput.addEventListener('input', updatePrompts);
      langInput.addEventListener('input', updatePrompts);
      
      // Initial call to populate prompt on page load
      updatePrompts();

      // --- Copy Button Functionality (Event Delegation) ---
      promptsContainer.addEventListener('click', (event) => {
        const button = event.target.closest('.copy-button');
        if (!button) return;

        const targetId = button.dataset.target;
        const textToCopy = document.getElementById(targetId).textContent;
        const buttonTextEl = button.querySelector('.button-text');

        navigator.clipboard.writeText(textToCopy).then(() => {
          const originalText = buttonTextEl.textContent;
          buttonTextEl.textContent = 'Copied!';
          button.classList.add('copied');
          
          setTimeout(() => {
            buttonTextEl.textContent = originalText;
            button.classList.remove('copied');
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy text: ', err);
          alert('Failed to copy text. Please try again.');
        });
      });
    });
  </script>

</body>
</html>
